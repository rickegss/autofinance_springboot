<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.loaded { opacity: 1; }
    </style>
    <title>Autofinance - Resumo</title>
</head>
<body class="font-poppins min-h-screen flex flex-col" style="background: linear-gradient(135deg, #c8cdd8 0%, #1a3a7a 100%)">

<nav class="flex justify-between items-center px-8 py-4">
    <div class="flex items-center gap-2 text-[#1a1aff]">
        <h1 class="text-[1.4rem] font-bold text-[#1a1aff]">Autofinance</h1>
        <svg class="w-7 h-7" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="19,2 35,11 35,27 19,36 3,27 3,11" fill="none" stroke="currentColor" stroke-width="2.5"/>
            <line x1="19" y1="2" x2="19" y2="36" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3" y1="11" x2="35" y2="27" stroke="currentColor" stroke-width="1.5"/>
            <line x1="35" y1="11" x2="3" y2="27" stroke="currentColor" stroke-width="1.5"/>
        </svg>
    </div>
    <a th:href="@{/first-config/details}" class="bg-white border-none rounded-[20px] px-5 py-2 text-[0.9rem] font-medium cursor-pointer transition-all duration-200 hover:bg-[#f0f0f0] hover:scale-[1.03]">
        ← Anterior
    </a>
</nav>

<div class="flex w-[90%] max-w-[1100px] mx-auto bg-white rounded-[20px] shadow-[0_8px_32px_rgba(0,0,0,0.15)] min-h-[620px] overflow-hidden">
    <aside class="w-[220px] bg-[#f0f2f8] px-[30px] py-[40px] flex-shrink-0">
        <h2 class="text-[2rem] font-extrabold text-[#1a1aff] leading-tight mb-10">Tudo pronto!</h2>
        <ul class="flex flex-col gap-4 list-none">
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl cursor-default">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold bg-[#ede9fe] text-[#5b21b6] flex-shrink-0">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </span>
                <span class="text-[0.95rem] font-medium text-[#5b21b6]">Categorias</span>
            </li>
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl cursor-default">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold bg-[#ede9fe] text-[#5b21b6] flex-shrink-0">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </span>
                <span class="text-[0.95rem] font-medium text-[#5b21b6]">Detalhes</span>
            </li>
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl bg-[#5b21b6] cursor-default">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold bg-white text-[#5b21b6] flex-shrink-0">3</span>
                <span class="text-[0.95rem] font-medium text-white">Resumo</span>
            </li>
        </ul>
    </aside>

    <div class="flex flex-col w-full p-8">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h3 class="text-[1.2rem] font-bold text-[#1a3a7a]">Seu plano de distribuição</h3>
                <p class="text-[#666] text-[0.85rem] mt-1">Baseado na sua meta e renda mensal informadas.</p>
            </div>
            <div class="text-right">
                <p class="text-[0.85rem] text-[#666] font-medium">Renda Base</p>
                <p class="text-[1.4rem] font-bold text-[#1a1aff]" id="display-income">R$ 0,00</p>
            </div>
        </div>

        <div class="w-full h-4 rounded-full bg-[#f0f2f8] flex overflow-hidden mb-8" id="progress-bar-container">
        </div>

        <div class="grid grid-cols-3 gap-5 mb-auto" id="distribution-cards">
        </div>

        <div class="flex justify-end items-center mt-8 pt-4 border-t border-[#f0f0f0]">
            <a th:href="@{/dashboard}" class="bg-[#5b21b6] text-white border-none rounded-xl px-8 py-3 text-[0.95rem] font-semibold cursor-pointer font-poppins transition-all duration-200 hover:bg-[#4c1d95] hover:scale-[1.03] text-center inline-block">
                Finalizar e ver Dashboard
            </a>
        </div>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    const userGoal = /*[[${user.financialGoal}]]*/ '50_30_20';
    const userIncome = /*[[${user.monthlyIncome}]]*/ 0.0;

    const currencyFormatter = new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    });

    document.getElementById('display-income').textContent = currencyFormatter.format(userIncome);

    let distributionRules = [];

    const goalMap = {
        'DEBT_RECOVERY': [
            { id: 'essentials', name: 'Custos Fixos', percentage: 70, color: 'bg-[#5b21b6]', icon: 'home' },
            { id: 'debts', name: 'Quitação de Dívidas', percentage: 30, color: 'bg-[#ef4444]', icon: 'trending-down' }
        ],
        'INVESTMENT': [
            { id: 'essentials', name: 'Custo de Vida', percentage: 50, color: 'bg-[#5b21b6]', icon: 'home' },
            { id: 'lifestyle', name: 'Estilo de Vida', percentage: 20, color: 'bg-[#8BA7D6]', icon: 'coffee' },
            { id: 'investments', name: 'Investimentos', percentage: 30, color: 'bg-[#10b981]', icon: 'rocket' }
        ],
        'BALANCED': [
            { id: 'needs', name: 'Essenciais', percentage: 50, color: 'bg-[#5b21b6]', icon: 'home' },
            { id: 'wants', name: 'Desejos', percentage: 30, color: 'bg-[#8BA7D6]', icon: 'shopping-bag' },
            { id: 'savings', name: 'Poupança/Dívidas', percentage: 20, color: 'bg-[#1a3a7a]', icon: 'piggy-bank' }
        ]
    };

    distributionRules = goalMap[userGoal] || goalMap['BALANCED'];

    const progressBarContainer = document.getElementById('progress-bar-container');
    const cardsContainer = document.getElementById('distribution-cards');

    distributionRules.forEach(rule => {
        const barSegment = document.createElement('div');
        barSegment.className = `h-full ${rule.color}`;
        barSegment.style.width = `${rule.percentage}%`;
        progressBarContainer.appendChild(barSegment);

        const amountValue = (userIncome * (rule.percentage / 100));

        const card = document.createElement('div');
        card.className = 'p-5 border-[1.5px] border-[#e0e0e0] rounded-[16px] bg-white transition-all duration-200 hover:shadow-md';

        card.innerHTML = `
            <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 rounded-full ${rule.color} flex items-center justify-center text-white">
                    <i data-lucide="${rule.icon}" class="w-4 h-4"></i>
                </div>
                <span class="font-bold text-[#1a3a7a] text-[0.95rem]">${rule.name}</span>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[1.2rem] font-extrabold text-[#1a1aff]">${currencyFormatter.format(amountValue)}</span>
                <span class="text-[0.8rem] text-[#666] font-medium">Equivale a ${rule.percentage}% da renda</span>
            </div>
        `;
        cardsContainer.appendChild(card);
    });

    lucide.createIcons();
</script>
<script th:src="@{/js/transitions.js}"></script>
</body>
</html>
