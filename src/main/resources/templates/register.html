<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.loaded { opacity: 1; }
    </style>
    <title>Autofinance - Registro</title>
</head>
<body class="font-poppins bg-[#f0f2f5] min-h-screen flex items-center justify-center">

<div class="bg-white w-[1000px] h-[800px] rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] flex">
    <div class="flex-1 bg-[#2c3e50] bg-cover bg-center rounded-l-xl"
         style="background-image: url('/assets/login_bg.jpeg')"></div>
    <div class="flex-1 px-[60px] pt-[80px] flex flex-col justify-start">
        <div class="flex flex-row items-center gap-[15px]">
            <svg class="w-[55px] h-[60px]" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="19,2 35,11 35,27 19,36 3,27 3,11" fill="none" stroke="currentColor" stroke-width="3.8"/>
                <line x1="19" y1="2" x2="19" y2="36" stroke="currentColor" stroke-width="2.5"/>
                <line x1="3" y1="11" x2="35" y2="27" stroke="currentColor" stroke-width="2.5"/>
                <line x1="35" y1="11" x2="3" y2="27" stroke="currentColor" stroke-width="2.5"/>
            </svg>
            <h2 class="text-[3.3rem] font-bold">Registre-se</h2>
        </div>
        <div class="mt-10">
            <form th:action="@{/register}" th:object="${user}" method="POST">
                <div class="mb-5">
                    <label for="email" class="block text-[1.2rem] text-[#00023c] mb-2">Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="seu@email.com"
                           class="w-full px-[15px] py-3 border-[2.1px] border-[#e0e0e0] rounded-xl text-base bg-[#f9f9f9] outline-none focus:border-blue-600 transition-colors">
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                          class="text-[#620909] text-[0.85rem] mt-1 block"></span>
                </div>
                <div class="mb-5">
                    <label for="password" class="block text-[1.2rem] text-[#00023c] mb-2">Senha</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="w-full px-[15px] py-3 border-[2.1px] border-[#e0e0e0] rounded-xl text-base bg-[#f9f9f9] outline-none focus:border-blue-600 transition-colors">
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                          class="text-[#620909] text-[0.85rem] mt-1 block"></span>
                </div>
                <div class="mb-5">
                    <label for="confirm-password" class="block text-[1.2rem] text-[#00023c] mb-2">Confirme a senha</label>
                    <input type="password" id="confirm-password" th:field="*{confirmPassword}"
                           class="w-full px-[15px] py-3 border-[2.1px] border-[#e0e0e0] rounded-xl text-base bg-[#f9f9f9] outline-none focus:border-blue-600 transition-colors">
                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                          class="text-[#620909] text-[0.85rem] mt-1 block"></span>
                </div>
                <div class="flex justify-center mt-5">
                    <button type="submit"
                            class="w-[60%] py-[14px] px-[30px] bg-[#3c0bb8] text-white border-none rounded-[18px] text-[1.3rem] font-semibold cursor-pointer transition-all duration-200 hover:opacity-85 hover:scale-[1.03]">
                        Confirmar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/transitions.js}"></script>
</body>
</html>
