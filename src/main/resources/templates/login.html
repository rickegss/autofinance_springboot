<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.loaded { opacity: 1; }
    </style>
    <title>Autofinance - Login</title>
</head>
<body class="font-poppins bg-[#f0f2f5] min-h-screen flex items-center justify-center">

<div class="bg-white w-[1000px] h-[800px] rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] flex">
    <div class="flex-1 bg-[#2c3e50] bg-cover bg-center rounded-l-xl"
         style="background-image: url('/assets/login_bg.jpeg')"></div>
    <div class="flex-1 px-[60px] flex flex-col justify-center">
        <div class="flex flex-col items-center">
            <svg class="w-[65px] h-[55px] mt-4 mb-0.5" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="19,2 35,11 35,27 19,36 3,27 3,11" fill="none" stroke="currentColor" stroke-width="3.8"/>
                <line x1="19" y1="2" x2="19" y2="36" stroke="currentColor" stroke-width="2.5"/>
                <line x1="3" y1="11" x2="35" y2="27" stroke="currentColor" stroke-width="2.5"/>
                <line x1="35" y1="11" x2="3" y2="27" stroke="currentColor" stroke-width="2.5"/>
            </svg>
            <h1 class="text-[3.5rem] font-bold mb-1.5">Autofinance</h1>
            <h2 class="text-[2.5rem] font-semibold mb-8">Login</h2>
        </div>
        <div th:if="${param.success}"
             class="bg-[#2ab2d8] text-white px-[18px] py-[18px] rounded-[25px] mb-5 text-[1.1rem] text-center">
            Usuário cadastrado com sucesso! Faça o login para continuar.
        </div>
        <div th:if="${param.error}"
             class="bg-[#480005] text-white px-4 py-4 rounded-[25px] mb-5 text-[0.99rem] text-center">
            Email ou senha incorretos.
        </div>
        <form th:action="@{/login}" method="POST">
            <div class="mb-5">
                <label for="email" class="block text-[1.2rem] text-[#00023c] mb-2">Email</label>
                <input type="email" id="email" name="username" placeholder="seu@email.com"
                       class="w-full px-[15px] py-3 border-[2.1px] border-[#e0e0e0] rounded-xl text-base bg-[#f9f9f9] outline-none focus:border-blue-600 transition-colors">
            </div>
            <div class="mb-5">
                <label for="password" class="block text-[1.2rem] text-[#00023c] mb-2">Senha</label>
                <input type="password" id="password" name="password" placeholder="********"
                       class="w-full px-[15px] py-3 border-[2.1px] border-[#e0e0e0] rounded-xl text-base bg-[#f9f9f9] outline-none focus:border-blue-600 transition-colors">
            </div>
            <button type="submit"
                    class="w-[60%] py-[13px] bg-[#13007e] text-white border-none rounded-2xl text-[1.2rem] font-semibold cursor-pointer mt-2.5 block mx-auto transition-all duration-200 hover:opacity-85 hover:scale-[1.03]">
                Confirmar
            </button>
            <div class="mt-6 flex justify-between items-center text-[0.85rem] mb-4">
                <a href="#" class="text-black underline transition-opacity hover:opacity-70">Esqueceu a senha?</a>
                <div class="flex items-center gap-2 text-black">
                    <span>Não tem uma conta?</span>
                    <a th:href="@{/register}"
                       class="bg-[#4256c7] text-white px-[18px] py-[7.5px] rounded-[10px] no-underline font-semibold transition-all duration-200 hover:opacity-85 hover:scale-[1.03]">
                        Registre-se
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/transitions.js}"></script>
</body>
</html>
