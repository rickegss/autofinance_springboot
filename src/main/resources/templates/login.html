<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Autofinance - Login</title>
</head>
<body>
<div class="container">
    <div class="image-side"></div>
    <div class="form-side">
        <div class="header-icon">
            <svg width="42" height="42" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="19,2 35,11 35,27 19,36 3,27 3,11" fill="none" stroke="currentColor" stroke-width="3.8"/>
                <line x1="19" y1="2" x2="19" y2="36" stroke="currentColor" stroke-width="2.5"/>
                <line x1="3" y1="11" x2="35" y2="27" stroke="currentColor" stroke-width="2.5"/>
                <line x1="35" y1="11" x2="3" y2="27" stroke="currentColor" stroke-width="2.5"/>
            </svg>
            <h1>Autofinance</h1>
            <h2>Login</h2>
        </div>
        <div th:if="${param.success}" class="alert-success">
            Usuário cadastrado com sucesso! Faça o login para continuar.
        </div>
        <div th:if="${param.error}" class="alert-error">
            Email ou senha incorretos.
        </div>
        <form th:action="@{/login}" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="username" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="********">
            </div>
            <button type="submit">Confirmar</button>
            <div class="footer-links">
                <a href="#">Esqueceu a senha?</a>
                <div class="register-section">
                    <span>Não tem uma conta?</span>
                    <a th:href="@{/register}">Registre-se</a>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
