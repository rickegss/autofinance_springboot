<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Autofinance - Login</title>
</head>
<body>
    <div class="container">
        <div class="image-side">   
        </div>
        <div class="form-side">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="12" width="4" height="10"></rect>
                    <rect x="9" y="6" width="4" height="16"></rect>
                    <rect x="16" y="9" width="4" height="13"></rect>
                </svg>
                <h1>Autofinance</h1>
                <h2>Login</h2>
            </div>
            <div th:if="${param.success}" class="alert-success">
                Usuário cadastrado com sucesso! Faça o login para continuar.
            </div>
            <div th:if="${param.error}" class="alert-error">
                Email ou senha incorretos.
            </div>
            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="username" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="********">
                </div>
                <button type="submit">Confirmar</button>
                <div class="footer-links">
                    <a href="#">Esqueceu a senha?</a>
                    <div class="register-section">
                        <span>Não tem uma conta?</span>
                        <a th:href="@{/register}" class="btn-small-register">Registre-se</a>
                    </div>
                </div>
            </form> 
        </div>
    </div>        
</body>
</html>
