<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.loaded { opacity: 1; }
    </style>
    <title>Autofinance - Configuração</title>
</head>
<body class="font-poppins min-h-screen flex flex-col"
      style="background: linear-gradient(135deg, #c8cdd8 0%, #1a3a7a 100%)">

<nav class="flex justify-between items-center px-8 py-4">
    <div class="flex items-center gap-2 text-[#1a1aff]">
        <h1 class="text-[1.4rem] font-bold text-[#1a1aff]">Autofinance</h1>
        <svg class="w-7 h-7" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="19,2 35,11 35,27 19,36 3,27 3,11" fill="none" stroke="currentColor" stroke-width="2.5"/>
            <line x1="19" y1="2" x2="19" y2="36" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3" y1="11" x2="35" y2="27" stroke="currentColor" stroke-width="1.5"/>
            <line x1="35" y1="11" x2="3" y2="27" stroke="currentColor" stroke-width="1.5"/>
        </svg>
    </div>
    <a th:href="@{/welcome}"
       class="bg-white border-none rounded-[20px] px-5 py-2 text-[0.9rem] font-medium cursor-pointer transition-all duration-200 hover:bg-[#f0f0f0] hover:scale-[1.03]">
        ← Anterior
    </a>
</nav>

<div class="flex w-[90%] max-w-[1100px] mx-auto bg-white rounded-[20px] shadow-[0_8px_32px_rgba(0,0,0,0.15)] min-h-[620px] overflow-hidden">

    <aside class="w-[220px] bg-[#f0f2f8] px-[30px] py-[40px] flex-shrink-0">
        <h2 class="text-[2rem] font-extrabold text-[#1a1aff] leading-tight mb-10">Primeira vez aqui?</h2>
        <ul class="flex flex-col gap-4 list-none">
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl bg-[#5b21b6] cursor-pointer">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold bg-white text-[#5b21b6] flex-shrink-0">1</span>
                <span class="text-[0.95rem] font-medium text-white">Categorias</span>
            </li>
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl cursor-pointer">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold text-[#aaa] flex-shrink-0">2</span>
                <span class="text-[0.95rem] font-medium text-[#aaa]">Detalhes</span>
            </li>
            <li class="flex items-center gap-3 px-[14px] py-[10px] rounded-xl cursor-pointer">
                <span class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[0.85rem] font-semibold text-[#aaa] flex-shrink-0">3</span>
                <span class="text-[0.95rem] font-medium text-[#aaa]">Resumo</span>
            </li>
        </ul>
    </aside>

    <div class="flex flex-col w-full p-8">

        <div class="flex justify-between items-end mb-6">
            <div>
                <h3 class="text-[1.2rem] font-bold text-[#1a3a7a]">Escolha suas categorias principais</h3>
                <p class="text-[#666] text-[0.85rem] mt-1">Selecione as opções que farão parte do seu painel.</p>
            </div>
            <div class="bg-[#ede9fe] text-[#5b21b6] px-4 py-2 rounded-xl font-bold text-[0.9rem] flex items-center gap-2">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span id="counter">0</span>
            </div>
        </div>

        <div class="grid grid-cols-6 gap-3 mb-6">
            <div th:each="category : ${categories}"
                 class="category-card flex flex-col items-center justify-center gap-2 p-4 border-[1.5px] border-[#e0e0e0] rounded-[14px] cursor-pointer text-[#5b21b6] text-[0.75rem] font-medium transition-all duration-200 hover:border-[#5b21b6] hover:bg-[#f5f0ff]">

                <i th:data-lucide="${category.icon}"></i>
                <span th:text="${category.name}"></span>

            </div>
        </div>

        <div class="flex justify-between items-center bg-[#f5f5fa] rounded-xl px-5 py-3 mt-auto">
            <div class="flex items-center gap-2 text-[#5b21b6] text-[0.82rem] font-medium">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>Você pode adicionar ou remover categorias depois.</span>
            </div>

            <button id="btn-continuar" class="bg-[#5b21b6] text-white border-none rounded-xl px-7 py-3 text-[0.95rem] font-semibold cursor-pointer font-poppins transition-all duration-200 hover:bg-[#4c1d95] hover:scale-[1.03]">
                Continuar
            </button>
        </div>

    </div>
</div>

<script>
    lucide.createIcons();

    const cards = document.querySelectorAll('.category-card');
    const counter = document.getElementById('counter');
    const btnContinuar = document.getElementById('btn-continuar');

    let selectedCategories = new Set();

    cards.forEach(card => {
        card.addEventListener('click', () => {
            const categoryName = card.querySelector('span').textContent;
            const isSelected = card.classList.contains('border-[#6100FF]');

            if (isSelected) {
                // desmarca e remove do Set
                card.classList.remove('border-[#6100FF]', 'bg-[#DDD9FF]');
                card.classList.add('border-[#e0e0e0]');
                selectedCategories.delete(categoryName);
            } else {
                // marca e adiciona no Set
                card.classList.add('border-[#6100FF]', 'bg-[#DDD9FF]');
                card.classList.remove('border-[#e0e0e0]');
                selectedCategories.add(categoryName);
            }
            if(counter) {
                counter.textContent = selectedCategories.size;
            }
        });
    });

    // POST -> Continuar
    btnContinuar.addEventListener('click', () => {
        if (selectedCategories.size === 0) {
            alert("Selecione pelo menos uma categoria para continuar.");
            return;
        }

        const payload = Array.from(selectedCategories);

        fetch('/api/config/categories', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                window.location.href = '/first-config/details';
            } else {
                console.error("Falha ao salvar categorias, status:", response.status);
            }
        })
        .catch(error => console.error('Erro na requisição:', error));
    });
</script>

<script th:src="@{/js/transitions.js}"></script>
</body>
</html>
